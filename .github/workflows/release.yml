env:
  IS_MAIN_OR_RELEASE_BRANCH: ${{ startsWith(github.ref, 'refs/heads/release/') || github.ref_name == 'main' }}
  BRANCH_NAME: ${{ github.ref_name }}

name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'release/1.*'
    paths-ignore:
      - '.github/**'
      - '.gitignore'
      - '*.md'
      - 'LICENSE'

jobs:
  # Build Greenshot with MSBuild
  # Upload build output to artifacts-greenshot-build
  build:
    name: Build Greenshot
    runs-on: windows-latest
    outputs:
      version: ${{ steps.nbgv.outputs.version }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '7.x'

    - name: Restore NuGet packages
      run: msbuild src/Greenshot.sln /p:Configuration=Release /restore /t:PrepareForBuild

    - name: Build and package
      run: msbuild src/Greenshot.sln /p:Configuration=Release /t:Rebuild /v:normal

    - name: Get version
      id: nbgv
      run: |
        dotnet tool install -g nbgv
        echo "version=$(nbgv get-version -p src/Greenshot -v SemVer2)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artifacts-greenshot-build
        path: src/Greenshot/bin/Release/net480/**
        if-no-files-found: error

  portable:
    # Creates a portable app from the build output
    # Creates a ZIP archive and uploads it to artifacts-greenshot-portable
    name: Build Portable ZIP
    runs-on: ubuntu-latest
    needs: build
    steps:

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: artifacts-greenshot-build
          path: artifacts-greenshot-build

      - name: Prepare portable folder
        run: |
          $buildArtifacts = "${{ github.workspace }}/artifacts-greenshot-build"
          $portableDir = "${{ github.workspace }}/portable"
          pwsh -File "${{ github.workspace }}/prepare-portable.ps1" -RepositoryRootPath ${{ github.workspace }} -BuildArtifactsPath $buildArtifacts -OutputPath $portableDir
        shell: pwsh

      - name: Create ZIP archive
        run: |
          $zipName = "Greenshot-PORTABLE-${{ needs.build.outputs.version }}-UNSTABLE-UNSIGNED.zip"
          Compress-Archive -Path "${{ github.workspace }}/portable/*" -DestinationPath $zipName -Force
        shell: pwsh

      - name: Upload portable build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-greenshot-portable
          path: Greenshot-PORTABLE-*.zip
          if-no-files-found: error

  deploy:
    # Deploy the release
    # Creates a GitHub Release
    # Creates a version tag if release branch
    name: Deploy (continuous build)
    runs-on: ubuntu-latest
    needs:
      - build
      - portable
    steps:

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download portable artifacts
        uses: actions/download-artifact@v5
        with:
          name: artifacts-greenshot-portable
          path: artifacts-greenshot-portable

      - name: Set tag name
        id: tag
        run: |
          if [[ "${{ env.IS_MAIN_OR_RELEASE_BRANCH }}" == "true" ]]; then
            echo "tag_name=v${{ needs.build.outputs.version }}" >> $GITHUB_OUTPUT
          else
            sanitized=$(echo "${{ env.BRANCH_NAME }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
            echo "tag_name=$sanitized" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create tag
        if: env.IS_MAIN_OR_RELEASE_BRANCH == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.build.outputs.version }}" -m "v${{ needs.build.outputs.version }}"
          git push origin "v${{ needs.build.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Greenshot ${{ needs.build.outputs.version }} (continuous build)"
          tag_name: ${{ steps.tag.outputs.tag_name }}
          files: artifacts-greenshot-portable/*.zip
          generate_release_notes: true
          draft: ${{ env.IS_MAIN_OR_RELEASE_BRANCH != 'true' }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
